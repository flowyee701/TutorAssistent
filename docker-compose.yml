services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tutor-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tutor
      POSTGRES_PASSWORD: tutor
      POSTGRES_DB: tutor_ai
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tutor -d tutor_ai']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
